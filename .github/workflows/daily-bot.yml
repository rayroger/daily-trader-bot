name: Daily Trading Bot

on:
  # Run daily at 4:30 PM Eastern Time (after market close)
  # This is 21:30 UTC
  schedule:
    - cron: '30 21 * * 1-5'  # Monday through Friday
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Comma-separated symbols to analyze (optional)'
        required: false
        default: ''
      execute_trades:
        description: 'Execute trades (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write  # Required to commit trading data back to the repository

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Configure git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Run daily trading bot
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ALPACA_ACCOUNT_NUMBER: ${{ secrets.ALPACA_ACCOUNT_NUMBER }}
        # Optional overrides for manual runs
        SYMBOLS: ${{ inputs.symbols }}
        EXECUTE_TRADES: ${{ inputs.execute_trades }}
        # Strategy tuning / debug (safe defaults; override in repo variables or environment if desired)
        MIN_CONFIDENCE: ${{ vars.MIN_CONFIDENCE }}
        VOLUME_THRESHOLD: ${{ vars.VOLUME_THRESHOLD }}
        DEBUG_STRATEGY: ${{ vars.DEBUG_STRATEGY }}
      run: |
        echo "Running daily trading bot..."
        python run_daily_bot.py

    - name: Commit and push trading data
      run: |
        if [[ -n $(git status --porcelain trading_data/) ]]; then
          git add trading_data/
          git commit -m "🤖 Daily trading bot run - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "Trading data committed and pushed"
        else
          echo "No changes to commit"
        fi

    - name: Upload trading data as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-data-${{ github.run_number }}
        path: |
          trading_data/
        retention-days: 90
